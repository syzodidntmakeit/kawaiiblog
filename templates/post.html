<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{POST_TITLE}} | KawaiiBlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    <meta name="description" content="{{POST_EXCERPT}}">
    <meta property="og:title" content="{{POST_TITLE}}">
    <meta property="og:description" content="{{POST_EXCERPT}}">
    <meta property="og:url" content="{{POST_URL}}">
    <link rel="canonical" href="{{POST_URL}}">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-custom-dark text-gray-200 antialiased" data-page="post">
    {{> header}}
    <main class="container mx-auto px-4 py-12">
        <article class="prose prose-invert lg:prose-xl mx-auto">
            <h1 class="text-4xl font-black tracking-tight mb-4 text-white">{{POST_TITLE}}</h1>
            <p class="text-sm uppercase tracking-[0.3em] text-kawaii-pink mb-2">{{POST_CATEGORY}}</p>
            <p class="text-gray-400 text-sm mb-8 flex flex-col md:flex-row md:items-center md:gap-4">
                <span>{{POST_DATE}}</span>
                <span class="text-kawaii-pink/80">{{POST_READING_TIME}}</span>
            </p>
            {{POST_CONTENT}}
        </article>
    </main>
    {{> footer}}
</body>
</html>
