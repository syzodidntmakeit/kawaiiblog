<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{POST_TITLE}} | KawaiiBlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    <meta name="description" content="{{POST_EXCERPT}}">
    <meta property="og:title" content="{{POST_TITLE}}">
    <meta property="og:description" content="{{POST_EXCERPT}}">
    <meta property="og:url" content="{{POST_URL}}">
    <link rel="canonical" href="{{POST_URL}}">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
        extend: {
            colors: {
              'kawaii-pink': '#FFC0CB',
              'kawaii-blue': '#A7C7E7',
              'kawaii-mint': '#B2F2BB',
              'kawaii-lavender': '#E6E6FA',
              'social-email': '#8B55CC',
              'social-github': '#FFFFFF',
              'social-linkedin': '#0A66C2',
              'social-twitter': '#FFFFFF',
              'social-instagram': '#E4405F',
              'social-mastodon': '#6364FF',
              'social-twitch': '#9146FF',
              'social-telegram': '#26A5E4',
              'social-patreon': '#FF424D',
              'social-threads': '#FFFFFF',
            }
        }
        }
    }
    </script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/site-config.js"></script>
</head>
<body class="bg-custom-dark text-gray-200 antialiased">
    <header class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black tracking-tighter">
                <a href="/" class="gradient-text">KawaiiBlog</a>
            </h1>
            <nav class="hidden md:flex space-x-6 text-lg font-bold items-center">
                <a href="/" class="hover:text-kawaii-pink transition-colors">Home</a>
                <a href="/pages/archive.html" class="hover:text-kawaii-blue transition-colors">Archive</a>
                <a href="/pages/about.html" class="hover:text-kawaii-mint transition-colors">About</a>
                <a href="/pages/contact.html" class="hover:text-kawaii-lavender transition-colors">Contact</a>
            </nav>
            <button id="mobile-menu-button" class="md:hidden p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
         <div id="mobile-menu" class="hidden md:hidden mt-4">
            <a href="/" class="block py-2 px-4 text-sm hover:bg-gray-700 rounded">Home</a>
            <a href="/pages/archive.html" class="block py-2 px-4 text-sm hover:bg-gray-700 rounded">Archive</a>
            <a href="/pages/about.html" class="block py-2 px-4 text-sm hover:bg-gray-700 rounded">About</a>
            <a href="/pages/contact.html" class="block py-2 px-4 text-sm hover:bg-gray-700 rounded">Contact</a>
        </div>
    </header>
    <main class="container mx-auto px-4 py-12">
        <article class="prose prose-invert lg:prose-xl mx-auto">
            <p class="text-sm uppercase tracking-[0.3em] text-kawaii-pink mb-2">{{POST_CATEGORY}}</p>
            <p class="text-gray-400 text-sm mb-8">{{POST_DATE}}</p>
            {{POST_CONTENT}}
        </article>
    </main>
    <footer class="container mx-auto px-4 py-8 mt-16 text-center text-gray-500">
        <p>&copy; 2025 kawaii-san.org. All wrongs reserved.</p>
        <p class="mt-2 text-sm">
            The code for this site is licensed under the
            <a href="https://www.gnu.org/licenses/gpl-3.0.en.html" class="underline hover:text-gray-300">GPLv3</a>.
            Blog content is licensed under a
            <a href="http://creativecommons.org/licenses/by-sa/4.0/" class="underline hover:text-gray-300">CC BY-SA 4.0</a>.
            Don't be a bitch.
        </p>
    </footer>
    <script src="/assets/js/script.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
    </script>
</body>
</html>
