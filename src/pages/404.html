<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    
    <title>404 Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.error('SW registration failed:', err));
    });
  }
</script>
</head>
<body class="bg-custom-dark text-gray-200 antialiased" data-page="404">
    {{> header}}

    <div id="contact-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-modal-button" class="absolute top-2 right-4 text-3xl text-gray-400 hover:text-white">&times;</button>
            <h2 class="text-2xl font-bold mb-4 text-kawaii-mint">Get In Touch</h2>
            <p class="text-gray-400 mb-6">Want to talk tech, collaborate on a project, argue about distros, or tell me my opinions are wrong?</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="mailto:syzodidntmakealongemail@proton.me" class="px-6 py-3 bg-kawaii-pink/10 hover:bg-kawaii-pink/20 border border-kawaii-pink rounded-lg transition-colors font-bold text-kawaii-pink">
                    Email
                </a>
                <a href="https://github.com/syzodidntmakeit" target="_blank" rel="noopener noreferrer" class="px-6 py-3 bg-kawaii-blue/10 hover:bg-kawaii-blue/20 border border-kawaii-blue rounded-lg transition-colors font-bold text-kawaii-blue">
                    GitHub
                </a>
                <a href="https://www.linkedin.com/in/isaiah-s-o-raja-rajendra-verma" class="px-6 py-3 bg-kawaii-mint/10 hover:bg-kawaii-mint/20 border border-kawaii-mint rounded-lg transition-colors font-bold text-kawaii-mint">
                    LinkedIn
                </a>
                <a href="https://twitter.com/syzodidntmakeit" target="_blank" rel="noopener noreferrer" class="px-6 py-3 bg-kawaii-lavender/10 hover:bg-kawaii-lavender/20 border border-kawaii-lavender rounded-lg transition-colors font-bold text-kawaii-lavender">
                    Twitter
                </a>
                <a href="https://instagram.com/isaiah.rawr" target="_blank" rel="noopener noreferrer" class="px-6 py-3 bg-kawaii-pink/10 hover:bg-kawaii-pink/20 border border-kawaii-pink rounded-lg transition-colors font-bold text-kawaii-pink">
                    Instagram
                </a>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto text-center">
            
            <h1 class="text-6xl font-black mt-2 leading-tight text-kawaii-pink mb-6">Woops!</h1>
            
            <p class="text-lg text-gray-300 leading-relaxed mb-8">Something went wrong. This page either doesn't exist or decided to go vegan. Sowwy.</p>

            <div class="flex justify-center">
                <img src="https://media1.tenor.com/m/XIrqTtjz5q8AAAAd/gotou-hitori-bocchi-the-rock.gif" alt="Bocchi the Rock glitching gif" class="rounded-lg shadow-lg">
            </div>

            <a href="/" class="inline-block mt-12 px-8 py-4 bg-gray-800 hover:bg-gray-700 border border-kawaii-pink rounded-lg transition-colors font-bold text-kawaii-pink">
                Go Back Home
            </a>
        </div>
    </main>

    {{> footer}}
</body>
</html>
