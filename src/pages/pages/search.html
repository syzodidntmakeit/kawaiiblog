<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | KawaiiBlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-custom-dark text-gray-200 antialiased" data-page="search">
    {{> header}}
    <main class="container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl font-black mb-4 gradient-text">Search Posts</h1>
            <p class="text-gray-400 mb-8">Kick off a query across every post, excerpt, and category.</p>
            <div class="space-y-6">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Type anything... (e.g. linux, training, self-hosting)" 
                    class="w-full px-4 py-3 rounded-lg bg-gray-800 text-gray-200 border border-gray-700 focus:border-kawaii-pink focus:outline-none transition-colors"
                >
                <div id="search-meta" class="text-sm text-gray-400"></div>
                <div id="results-container" class="space-y-6">
                    <p class="text-gray-400">Start typing to see results.</p>
                </div>
            </div>
        </div>
    </main>
    {{> footer}}
    <script src="/assets/js/search.js"></script>
</body>
</html>
