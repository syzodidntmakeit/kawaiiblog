<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KawaiiBlog</title>
    <meta name="description" content="A personal blog about tech, lifting, self-hosting, anime, and whatever else is occupying my brain space. Built the Arch Way.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <meta property="og:title" content="KawaiiBlog">
    <meta property="og:description" content="A personal blog about tech, lifting, self-hosting, anime, and whatever else is occupying my brain space.">
    <meta property="og:image" content="https://kawaii-san.org/assets/images/og-default.png">
    <meta property="og:url" content="https://kawaii-san.org">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="alternate" type="application/rss+xml" title="kawaii-san.org" href="/rss.xml">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/site-config.js"></script>
</head>
<body class="bg-custom-dark text-gray-200 antialiased" data-page="home">

    {{> header}}

    <main class="container mx-auto px-4 py-12">
        <div class="space-y-12">

            <div class="flex gap-2 mb-12 flex-wrap">
                <button data-category="all" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors active:bg-kawaii-pink active:text-custom-dark">All Posts</button>
                <button data-category="tech" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors">Tech</button>
                <button data-category="commentary" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors">Commentary</button>
                <button data-category="powerlifting" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors">Powerlifting</button>
                <button data-category="games" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors">Games</button>
                <button data-category="music" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors">Music</button>
                <button data-category="anime" class="filter-button px-4 py-2 border border-kawaii-pink rounded-lg text-kawaii-pink bg-transparent hover:bg-kawaii-pink hover:text-custom-dark transition-colors">Anime</button>
            </div>

            <div id="posts-container" class="space-y-12">
                <div class="flex justify-center items-center py-12">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-kawaii-pink"></div>
                </div>
            </div>
        </div>
    </main>

    <button id="back-to-top" class="fixed bottom-8 right-8 hidden px-4 py-2 bg-kawaii-pink text-gray-900 rounded-lg font-bold hover:bg-kawaii-blue transition-colors z-50">↑ Back to Top</button>

    {{> footer}}
    <script src="/assets/js/homepage.js"></script>
</body>
</html>
